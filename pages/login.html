<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltrix</title>

  <link rel="stylesheet" href="/css/variavel.css">

  <link rel="icon" href="/public/icone.png" type="image/x-icon">


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  
</head>

<body>

<div class="intro">

    <div class="logo-intro">

        <span class="letter">V</span>
        <span class="letter">E</span>
        <span class="letter">L</span>
        <span class="letter">T</span>
        <span class="letter">R</span>
        <span class="letter">I</span>
        <span class="letter">X</span>

    </div>

</div>

<div class="login-container">


    <div class="login-card">

            <div class="login-top">

                <h2>Entrar</h2>

                <p>
                    Acesse sua conta Veltrix
                </p>

            </div>
<form>
            

                <div class="input-box">

                    <label>Email</label>

                    <input
                    type="email"
                    placeholder="Digite seu email">

                </div>

                <div class="input-box">

                    <label>Senha</label>

                    <input
                    type="password"
                    placeholder="Digite sua senha">

                </div>

                <div class="login-options">

                    <label>

                        <input type="checkbox">

                        Lembrar-me

                    </label>

                    <a href="#">
                        Esqueci minha senha
                    </a>

                </div>

                <button type="submit">
                    ACESSAR CONTA
                </button>

            </form>

            <div class="divider">

                <span>OU CONTINUE COM</span>

            </div>

            <div class="social-login">

                <button>Google</button>
                <button>GitHub</button>

            </div>

            <div class="register-link">

                Não possui conta?

                <a href="#">
                    Criar Conta
                </a>

            </div>

        </div>

    </div>

</section>

 <!-- FOOTER -->
  <footer>

    <div class="footer-line"></div>

    <span>VELTRIX.COM.BR</span>

    <div class="footer-line"></div>

  </footer>

  

</body>
</html>
